fragment Subject on Subject {
  id
  denomination
}

fragment ProgramCourse on Course {
  id
  denomination
  image
  slug
  level
  updated_at
}

fragment ProgramVersionCourseEntry on ProgramVersionCourseEntry {
  rank
  prerequisiteCourseId
  course {
    ...ProgramCourse
  }
}

fragment ProgramVersion on ProgramVersion {
  id
  status
  version_number
  courseEntries {
    ...ProgramVersionCourseEntry
  }
}

fragment EditableProgram on Program {
  id
  denomination
  slug
  subtitle
  description
  level
  image
  is_published
  subjects {
    ...Subject
  }
  objectives {
    id
    objective
  }
  requirements {
    id
    requirement
  }
  editableVersion {
    ...ProgramVersion
  }
}

query EditableProgram($id: ID!) {
  editableProgram(id: $id) {
    ...EditableProgram
  }
  teacherCourses {
    ...ProgramCourse
  }
  subjects {
    ...Subject
  }
}

mutation UpdateProgram($updateProgramInfo: UpdateProgramInfoInput!) {
  updateProgram(updateProgramInfo: $updateProgramInfo) {
    success
    errors {
      message
    }
    program {
      ...EditableProgram
    }
  }
}

mutation DeleteProgram($id: ID!) {
  deleteProgram(id: $id) {
    success
    errors {
      message
    }
  }
}

mutation UpdateProgramVersionCourses(
  $updateProgramVersionCoursesInfo: UpdateProgramVersionCoursesInput!
) {
  updateProgramVersionCourses(updateProgramVersionCoursesInfo: $updateProgramVersionCoursesInfo) {
    success
    errors {
      message
    }
    programVersion {
      ...ProgramVersion
    }
  }
}

mutation PublishProgramVersion($programId: ID!) {
  publishProgramVersion(programId: $programId) {
    success
    errors {
      message
    }
    programVersion {
      ...ProgramVersion
      published_at
    }
  }
}

mutation CreateProgramVersion($programId: ID!) {
  createProgramVersion(programId: $programId) {
    success
    errors {
      message
    }
    programVersion {
      ...ProgramVersion
    }
  }
}
