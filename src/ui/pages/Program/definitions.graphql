fragment Program on Program {
  id
  denomination
  slug
  subtitle
  description
  level
  image
  updated_at
  created_at
  subjects {
    id
    denomination
  }
  objectives {
    id
    objective
  }
  requirements {
    id
    requirement
  }
  status
  enrolledLearnersCount
  instructor {
    id
    first_name
    last_name
    avatar_url
    description
    isFollowed
    isAllowedToFollow
  }
  currentVersion {
    id
    version_number
    courses {
      id
      denomination
      slug
      level
      image
      status
      rating
      participationCount
      instructor {
        first_name
        last_name
        avatar_url
      }
    }
  }
  latestVersionNumber
}

query Program($slug: String!) {
  program(slug: $slug) {
    ...Program
  }
}

mutation EnrollInProgram($programId: ID!) {
  enrollInProgram(programId: $programId) {
    success
    errors {
      message
    }
    program {
      id
      status
      latestVersionNumber
    }
  }
}

mutation UnenrollFromProgram($programId: ID!) {
  unenrollFromProgram(programId: $programId) {
    success
    errors {
      message
    }
    program {
      id
      status
      latestVersionNumber
    }
  }
}

mutation UpgradeToLatestProgramVersion($programId: ID!) {
  upgradeToLatestProgramVersion(programId: $programId) {
    success
    errors {
      message
    }
    program {
      id
      status
      latestVersionNumber
      currentVersion {
        id
        version_number
        courses {
          id
          denomination
          slug
          level
          image
          status
          participationCount
          instructor {
            first_name
            last_name
            avatar_url
          }
        }
      }
    }
  }
}
