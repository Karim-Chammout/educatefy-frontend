fragment Program on Program {
  id
  denomination
  slug
  subtitle
  description
  level
  image
  updated_at
  created_at
  subjects {
    id
    denomination
  }
  objectives {
    id
    objective
  }
  requirements {
    id
    requirement
  }
  status
  rating
  ratingsCount
  enrolledLearnersCount
  instructor {
    id
    first_name
    last_name
    avatar_url
    description
    isFollowed
    isAllowedToFollow
  }
  courses {
    id
    denomination
    slug
    level
    image
    status
    rating
    participationCount
    instructor {
      first_name
      last_name
      avatar_url
    }
  }
}

query Program($slug: String!) {
  program(slug: $slug) {
    ...Program
  }
}

mutation EnrollInProgram($programId: ID!) {
  enrollInProgram(programId: $programId) {
    success
    errors {
      message
    }
    program {
      id
      status
    }
  }
}

mutation UnenrollFromProgram($programId: ID!) {
  unenrollFromProgram(programId: $programId) {
    success
    errors {
      message
    }
    program {
      id
      status
    }
  }
}

mutation TrackProgramProgress($programId: ID!, $shouldMarkProgramAsCompleted: Boolean!) {
  trackProgramProgress(programId: $programId, shouldMarkProgramAsCompleted: $shouldMarkProgramAsCompleted) {
    success
    errors {
      message
    }
  }
}
